<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Test Handoff CAF</title>
</head>
<body>

<h2>Test Handoff CAF</h2>

<textarea id="jsonInput" style="width:100%; height:250px;">
INCOLLA QUI LA RISPOSTA JSON COMPLETA
</textarea>

<br><br>
<button onclick="startHandoff()">Avvia Handoff</button>

<script>
function startHandoff() {
  let data;

  try {
    data = JSON.parse(document.getElementById('jsonInput').value);
  } catch (e) {
    alert('JSON non valido');
    return;
  }

  if (!data.handoff || !data.redirect_url) {
    alert('JSON non contiene handoff o redirect_url');
    return;
  }

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = data.redirect_url;

  Object.entries(data.handoff).forEach(([key, value]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = value;
    form.appendChild(input);
  });

  document.body.appendChild(form);

  console.log("Invio handoff:", data.handoff);

  form.submit();
}
</script>

</body>
</html>
